<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f5c842">
<title>Navi Routes</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e1012;--panel:#161a1e;--surface:#1e2328;--border:#2a2f36;
  --amber:#f5c842;--orange:#e8711a;--green:#4caf7d;--red:#e05252;
  --text:#e8e4dc;--muted:#6b7280;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif}
/* App shell */
.app{display:flex;flex-direction:column;height:100%;height:100dvh}
/* Top bar */
.topbar{
  background:var(--bg);padding:calc(var(--safe-top) + 10px) 14px 10px;
  border-bottom:2px solid var(--amber);display:flex;align-items:center;
  gap:10px;z-index:1000;flex-shrink:0;
}
.topbar-icon{font-size:20px;line-height:1}
.topbar h1{font-size:22px;font-weight:800;letter-spacing:3px;color:var(--amber);flex:1}
.gear-btn{
  width:36px;height:36px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:18px;cursor:pointer;flex-shrink:0;
}
/* Map */
#map{flex:1;min-height:0;z-index:1}
/* Search card */
.search-card{
  background:var(--panel);border-top:1px solid var(--border);
  padding:12px 14px;flex-shrink:0;z-index:999;
}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-a{background:var(--amber)}
.dot-b{background:var(--orange)}
.dot-line{width:1px;height:12px;background:var(--border);margin:1px auto;display:block}
.dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:2px}
.inputs-col{flex:1;display:flex;flex-direction:column;gap:6px}
input[type=text]{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;color:var(--text);
  font-family:'Barlow Condensed',sans-serif;font-size:16px;outline:none;
  -webkit-appearance:none;
}
input[type=text]:focus{border-color:var(--amber)}
input::placeholder{color:var(--muted)}
.loc-btn{
  width:44px;height:44px;border-radius:8px;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;color:var(--muted);
}
.loc-btn.active{border-color:var(--amber);color:var(--amber)}
.find-btn{
  width:100%;padding:14px;background:var(--amber);color:var(--bg);
  border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.find-btn:active{transform:scale(0.98)}
.find-btn:disabled{background:var(--surface);color:var(--muted)}
.find-btn.loading{background:var(--surface);color:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
/* Settings sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none}
.sheet-overlay.open{display:block}
.sheet{
  position:fixed;bottom:0;left:0;right:0;background:var(--panel);
  border-radius:20px 20px 0 0;padding:0 0 calc(var(--safe-bot) + 16px);
  z-index:2001;transform:translateY(100%);transition:transform .3s ease;
  max-height:80dvh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.sheet-title{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--amber);padding:14px 18px 0;text-transform:uppercase}
/* Speed */
.sec{padding:14px 18px;border-bottom:1px solid var(--border)}
.sec-lbl{font-size:10px;letter-spacing:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:10px}
.spd-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.spd-num{font-size:40px;font-weight:800;color:var(--amber);font-family:'JetBrains Mono',monospace;transition:color .3s;line-height:1}
.spd-unit{font-size:15px;color:var(--muted)}
.spd-hint{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none;margin-bottom:6px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--amber);cursor:pointer;border:3px solid var(--bg)}
.spd-ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.road-note{font-size:11px;color:var(--green);font-family:'JetBrains Mono',monospace;margin-top:10px;padding:7px 10px;background:rgba(76,175,125,0.08);border-left:2px solid var(--green);border-radius:0 4px 4px 0}
/* Toggles */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.tog-row+.tog-row{border-top:1px solid var(--border)}
.tog-name{font-size:16px;font-weight:600}
.tog-desc{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.2s}
.tsl::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s}
.tog input:checked+.tsl{background:rgba(245,200,66,0.2);border:1px solid var(--amber)}
.tog input:checked+.tsl::before{transform:translateX(19px);background:var(--amber)}
/* Error toast */
.toast{
  position:fixed;top:calc(var(--safe-top) + 70px);left:16px;right:16px;
  background:#3a1a1a;border:1px solid var(--red);border-radius:10px;
  padding:12px 14px;font-size:13px;color:#ff9999;font-family:'JetBrains Mono',monospace;
  z-index:3000;display:none;animation:slidedown .2s ease;
}
@keyframes slidedown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.toast.show{display:block}
/* Results pill */
.results-pill{
  position:fixed;bottom:calc(var(--safe-bot) + 200px);left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--amber);border-radius:24px;
  padding:8px 18px;display:none;align-items:center;gap:16px;z-index:998;
  white-space:nowrap;
}
.results-pill.show{display:flex}
.pill-stat{text-align:center}
.pill-val{font-size:18px;font-weight:700;color:var(--amber);font-family:'JetBrains Mono',monospace;display:block}
.pill-lbl{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.pill-div{width:1px;height:28px;background:var(--border)}
/* Leaflet overrides */
.leaflet-control-attribution{background:rgba(0,0,0,.5)!important;color:#555!important;font-size:9px!important}
.leaflet-control-attribution a{color:#777!important}
.leaflet-control-zoom{margin:0 0 0 10px!important}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="topbar-icon">🏍️</span>
    <h1>NAVI ROUTES</h1>
    <div class="gear-btn" onclick="toggleSheet()">⚙</div>
  </div>
  <div id="map"></div>
  <div class="search-card">
    <div class="input-row">
      <div class="dot-col">
        <div class="dot dot-a"></div>
        <div class="dot-line"></div>
        <div class="dot dot-b"></div>
      </div>
      <div class="inputs-col">
        <input type="text" id="startInput" placeholder="Starting point...">
        <input type="text" id="endInput" placeholder="Destination..." onkeydown="if(event.key==='Enter')findRoute()">
      </div>
      <div class="loc-btn" id="locBtn" onclick="useMyLocation()" title="Use my location">📍</div>
    </div>
    <button class="find-btn" id="findBtn" onclick="findRoute()">Find Navi Route</button>
  </div>
</div>

<!-- Settings Sheet -->
<div class="sheet-overlay" id="overlay" onclick="toggleSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Route Settings</div>
  <div class="sec">
    <div class="sec-lbl">Max Speed Preference</div>
    <div class="spd-row">
      <span class="spd-num" id="spdNum">45</span>
      <div><div class="spd-unit">mph max</div></div>
    </div>
    <input type="range" id="spdSlider" min="1" max="4" step="1" value="3">
    <div class="spd-ticks"><span>25</span><span>35</span><span>45</span><span>55+</span></div>
    <div class="road-note" id="roadNote">Avoids highways &amp; freeways → back roads &amp; arterials</div>
  </div>
  <div class="sec">
    <div class="sec-lbl">Always Avoid</div>
    <div class="tog-row">
      <div><div class="tog-name">Toll Roads</div><div class="tog-desc">Skip fee lanes</div></div>
      <label class="tog"><input type="checkbox" id="avoidTolls"><span class="tsl"></span></label>
    </div>
    <div class="tog-row">
      <div><div class="tog-name">Ferries</div><div class="tog-desc">Land routes only</div></div>
      <label class="tog"><input type="checkbox" id="avoidFerries"><span class="tsl"></span></label>
    </div>
  </div>
  <div style="padding:14px 18px 0">
    <button class="find-btn" onclick="toggleSheet();findRoute()">Apply &amp; Route</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Results -->
<div class="results-pill" id="resultsPill">
  <div class="pill-stat"><span class="pill-val" id="distVal">—</span><span class="pill-lbl">Distance</span></div>
  <div class="pill-div"></div>
  <div class="pill-stat"><span class="pill-val" id="timeVal">—</span><span class="pill-lbl">Est. Time</span></div>
</div>

<script>
// API KEY — keep this file private
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjQ1NzJhY2Q1NGQwMTQ1MDRiOThjNzUyNTcxYWQ1YTBiIiwiaCI6Im11cm11cjY0In0=';

const SPEED_CFG = {
  1:{mph:25,label:'Residential & local streets → very chill ride',colors:'#4caf7d'},
  2:{mph:35,label:'Backroads & county roads → great Navi territory',colors:'#8bc34a'},
  3:{mph:45,label:'Avoids highways → back roads & arterials',colors:'#f5c842'},
  4:{mph:'55+',label:'Standard roads, highway-free',colors:'#e8711a'}
};

// Map
const map = L.map('map',{zoomControl:true,attributionControl:true}).setView([43.5765,-116.5635],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
  subdomains:'abcd',maxZoom:20
}).addTo(map);

let routeLayers=[],startMkr=null,endMkr=null,userLatLon=null;

// Speed slider
const spdSlider=document.getElementById('spdSlider');
spdSlider.addEventListener('input',()=>{
  const c=SPEED_CFG[spdSlider.value];
  document.getElementById('spdNum').textContent=c.mph;
  document.getElementById('spdNum').style.color=c.colors;
  document.getElementById('roadNote').textContent=c.label;
});

// Sheet
function toggleSheet(){
  document.getElementById('sheet').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// Toast
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),4000);
}

// Geolocation
function useMyLocation(){
  const btn=document.getElementById('locBtn');
  btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(pos=>{
    userLatLon=[pos.coords.latitude,pos.coords.longitude];
    document.getElementById('startInput').value='My Location';
    btn.textContent='✅';btn.classList.add('active');
    map.setView(userLatLon,13);
    if(startMkr){map.removeLayer(startMkr)}
    startMkr=L.marker(userLatLon,{icon:mkIcon('#f5c842','A')}).addTo(map);
    setTimeout(()=>{btn.textContent='📍'},2000);
  },err=>{
    btn.textContent='📍';
    showToast('Could not get location. Check phone permissions.');
  },{timeout:10000,enableHighAccuracy:true});
}

// Marker
function mkIcon(color,letter){
  return L.divIcon({
    html:`<div style="width:28px;height:28px;background:${color};border:3px solid #0e1012;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:#0e1012;display:block;line-height:1">${letter}</span></div>`,
    iconSize:[28,28],iconAnchor:[14,28],className:''
  });
}

// Geocode
async function geocode(addr){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`,{
    headers:{'Accept-Language':'en','User-Agent':'NaviRouteFinder/1.0'}
  });
  const d=await r.json();
  if(!d.length) throw new Error(`Could not find: "${addr}"`);
  return [parseFloat(d[0].lon),parseFloat(d[0].lat)];
}

// Route
async function findRoute(){
  document.getElementById('resultsPill').classList.remove('show');
  const startAddr=document.getElementById('startInput').value.trim();
  const endAddr=document.getElementById('endInput').value.trim();
  if(!startAddr){showToast('Enter a starting point.');return}
  if(!endAddr){showToast('Enter a destination.');return}

  const btn=document.getElementById('findBtn');
  btn.textContent='Routing...';btn.classList.add('loading');btn.disabled=true;

  try{
    let start;
    if(userLatLon && startAddr==='My Location'){
      start=[userLatLon[1],userLatLon[0]]; // [lon, lat] for ORS
    } else {
      start=await geocode(startAddr);
    }
    const end=await geocode(endAddr);

    const avoid=new Set(['highways']);
    if(document.getElementById('avoidTolls').checked) avoid.add('tollways');
    if(document.getElementById('avoidFerries').checked) avoid.add('ferries');

    const body={
      coordinates:[start,end],
      options:{avoid_features:[...avoid]}
    };

    const res=await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson',{
      method:'POST',
      headers:{'Authorization':ORS_KEY,'Content-Type':'application/json','Accept':'application/geo+json, application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let msg=`API error ${res.status}`;
      try{const j=await res.json();msg=j?.error?.message||msg}catch(e){}
      throw new Error(msg);
    }
    const gj=await res.json();
    const feat=gj.features[0];
    const summary=feat.properties.summary;

    routeLayers.forEach(l=>map.removeLayer(l));routeLayers=[];
    if(startMkr){map.removeLayer(startMkr);startMkr=null}
    if(endMkr){map.removeLayer(endMkr);endMkr=null}

    const shadow=L.geoJSON(feat.geometry,{style:{color:'#000',weight:9,opacity:.2,lineCap:'round',lineJoin:'round'}}).addTo(map);
    const route=L.geoJSON(feat.geometry,{style:{color:'#f5c842',weight:4,opacity:.95,lineCap:'round',lineJoin:'round'}}).addTo(map);
    routeLayers=[shadow,route];

    const sll=userLatLon && startAddr==='My Location' ? [userLatLon[0],userLatLon[1]] : [start[1],start[0]];
    startMkr=L.marker(sll,{icon:mkIcon('#f5c842','A')}).addTo(map);
    endMkr=L.marker([end[1],end[0]],{icon:mkIcon('#e8711a','B')}).addTo(map);

    map.fitBounds(route.getBounds(),{padding:[60,60]});

    const distMi=(summary.distance*0.000621371).toFixed(1);
    const mins=Math.round(summary.duration/60);
    const hrs=Math.floor(mins/60);
    const rem=mins%60;
    document.getElementById('distVal').textContent=distMi+' mi';
    document.getElementById('timeVal').textContent=hrs>0?`${hrs}h ${rem}m`:`${mins}m`;
    document.getElementById('resultsPill').classList.add('show');

  }catch(err){
    showToast(err.message);
  }finally{
    btn.textContent='Find Navi Route';btn.classList.remove('loading');btn.disabled=false;
  }
}

// PWA service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
